name: Terraform Build

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: write
  id-token: write   # required for AWS OIDC

env:
  TF_VAR_CLOUDFLARE_GLOBAL_API_TOKEN: ${{ secrets.CLOUDFLARE_GLOBAL_API_TOKEN }}
  TF_VAR_CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
  EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}

jobs:
  plan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug network
        run: |
          nslookup api.cloudflare.com
          curl -I https://api.cloudflare.com/client/v4/user/tokens/verify

      - name: Debug env
        run: |
          env | grep TF_VAR

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.3

      - name: Terraform Cloud auth
        run: |
          mkdir -p ~/.terraform.d
          cat > ~/.terraform.d/credentials.tfrc.json <<EOF
          {
            "credentials": {
              "app.terraform.io": {
                "token": "${{ secrets.TF_API_TOKEN }}"
              }
            }
          }
          EOF

      # -----------------------------
      # AWS AUTH (OIDC — required)
      # -----------------------------

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::495599767146:role/github-terraform
          aws-region: us-west-1

      # -----------------------------
      # Terraform lifecycle
      # -----------------------------
      - name: Terraform Init
        run: terraform init

      - name: Terraform Format
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -no-color

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug network
        run: |
          nslookup api.cloudflare.com
          curl -I https://api.cloudflare.com/client/v4/user/tokens/verify

      - name: Debug env
        run: |
          env | grep TF_VAR

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.3

      - name: Terraform Cloud auth
        run: |
          mkdir -p ~/.terraform.d
          cat > ~/.terraform.d/credentials.tfrc.json <<EOF
          {
            "credentials": {
              "app.terraform.io": {
                "token": "${{ secrets.TF_API_TOKEN }}"
              }
            }
          }
          EOF

      # -----------------------------
      # AWS AUTH (OIDC — required)
      # -----------------------------

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::495599767146:role/github-terraform
          aws-region: us-west-1

      # -----------------------------
      # Terraform lifecycle
      # -----------------------------
      - name: Terraform Init
        run: terraform init

      - name: Terraform Format
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Apply
        run: terraform apply -auto-approve

      - name: Capture EC2 public IP
        id: terraform_outputs
        run: echo "public_ip=$(terraform output -raw public_ip)" >> "$GITHUB_OUTPUT"
      
      # necessary because the cert and key are generated in Terraform cloud VM (free up to 500 resources) 
      # and we need to pass them to Ansible
      - name: Write origin cert and key
        run: |
          terraform output -raw origin_cert_pem > origin.crt
          terraform output -raw origin_key_pem > origin.key
          chmod 600 origin.key

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Generate Ansible inventory
        run: |
          cat > inventory.runtime.ini <<EOF
          [web]
          ${{ steps.terraform_outputs.outputs.public_ip }} ansible_user=ec2-user ansible_ssh_private_key_file=~/.ssh/id_rsa
          EOF

      - name: Add EC2 host to known_hosts
        run: ssh-keyscan -H "${{ steps.terraform_outputs.outputs.public_ip }}" >> ~/.ssh/known_hosts

      - name: Run Ansible to deploy certs and configure nginx
        run: |
          ansible-playbook -i inventory.runtime.ini site.yml \
            --extra-vars "tls_cert_path=origin.crt tls_key_path=origin.key"
